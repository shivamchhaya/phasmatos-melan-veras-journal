<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phasmatos Melan Veras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fdfcf8;
            --environment: #0d0d0d;
            --charcoal: #1a1a1a;
            --ink: #1c1c1c;
            --gold: #a68b5a;
            --glass: rgba(255, 255, 255, 0.02);
            --transition-smooth: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--environment);
            color: var(--paper);
            font-family: 'Cormorant Garamond', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2500px;
        }

        /* Architectural Backdrop */
        .ambient-light {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(253, 252, 248, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* The Object: Editorial Journal */
        .journal-object {
            position: relative;
            width: 840px;
            height: 560px;
            background: var(--charcoal);
            border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: var(--transition-smooth);
            z-index: 10;
        }

        .journal-object.open {
            transform: rotateX(2deg) translateY(-20px);
            box-shadow: 0 60px 120px rgba(0,0,0,0.9);
        }

        /* Pages: Heavy Matte Paper */
        .pages-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--paper);
            display: flex;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.02);
        }

        .page {
            flex: 1;
            padding: 80px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* The Gutter: Editorial Precision */
        .gutter {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 1px;
            background: rgba(0,0,0,0.06);
            transform: translateX(-50%);
            z-index: 20;
        }

        .gutter-shadow {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 60px;
            transform: translateX(-50%);
            background: linear-gradient(to right, 
                rgba(0,0,0,0) 0%, 
                rgba(0,0,0,0.03) 50%, 
                rgba(0,0,0,0) 100%);
            pointer-events: none;
            z-index: 19;
        }

        /* UI Elements: Minimalist */
        .label-tiny {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--ink);
            opacity: 0.3;
            margin-bottom: 40px;
        }

        .input-silent {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: var(--ink);
            resize: none;
            line-height: 1.8;
            height: 100%;
        }

        /* The Transformation View */
        .stefan-view {
            opacity: 0;
            transition: opacity 2s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .stefan-view.active { opacity: 1; }

        .date-line {
            font-size: 0.8rem;
            color: var(--ink);
            opacity: 0.4;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }

        .ink-writing {
            font-family: 'Pinyon Script', cursive;
            font-size: 1.8rem;
            color: var(--ink);
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* The Action: Wax Seal / Debossed Button */
        .seal-container {
            position: absolute;
            bottom: 80px;
            right: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 100;
        }

        .seal-btn {
            width: 44px; height: 44px;
            border: 1px solid rgba(0,0,0,0.1);
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition-smooth);
        }

        .seal-btn:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .seal-btn::after {
            content: '';
            width: 8px; height: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            transition: var(--transition-smooth);
        }

        .seal-btn:hover::after {
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold);
        }

        /* Ink Flow Animation */
        .ink-word {
            display: inline;
            opacity: 0;
            filter: blur(4px);
            transform: translateY(2px);
            transition: opacity 1.5s ease, filter 2s ease, transform 1.5s ease;
        }

        .ink-word.visible {
            opacity: 0.9;
            filter: blur(0px);
            transform: translateY(0);
        }

        .hidden { display: none !important; }

        /* The Shadow Sweep */
        .shadow-sweep {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--environment);
            z-index: 50;
            transform: translateX(-100%);
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .sweep-active {
            transform: translateX(100%);
        }

    </style>
</head>
<body>
    <div class="ambient-light"></div>
    
    <div id="journal" class="journal-object">
        <div id="sweep" class="shadow-sweep"></div>
        <div class="pages-container">
            <div class="gutter"></div>
            <div class="gutter-shadow"></div>
            
            <!-- Page Left -->
            <div class="page">
                <div id="input-controls">
                    <div class="label-tiny">Confess</div>
                    <textarea id="thought-input" class="input-silent" placeholder="Silence your mind and write..."></textarea>
                </div>
                <div id="stefan-view-left" class="stefan-view hidden">
                    <div class="date-line" id="date-el"></div>
                    <div id="ink-output-left" class="ink-writing"></div>
                </div>
            </div>

            <!-- Page Right -->
            <div class="page">
                <div id="stefan-view-right" class="stefan-view hidden">
                    <div id="ink-output-right" class="ink-writing"></div>
                </div>
                
                <div id="action-ui" class="seal-container">
                    <div class="label-tiny" style="margin-bottom: 0;">Cast</div>
                    <button id="cast-btn" class="seal-btn"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const castBtn = document.getElementById('cast-btn');
        const sweep = document.getElementById('sweep');
        const journal = document.getElementById('journal');
        const inputControls = document.getElementById('input-controls');
        const actionUi = document.getElementById('action-ui');
        const stefanViews = document.querySelectorAll('.stefan-view');
        const dateEl = document.getElementById('date-el');
        const outputLeft = document.getElementById('ink-output-left');
        
        const prefixes = [
            "I have spent a lifetime running from the shadows, only to find them waiting in the ink. ",
            "The weight of the years is silent tonight, yet I can hear every heartbeat in this house. ",
            "I write these words not for forgiveness, but because the silence is no longer enough. ",
            "There is a darkness in the Salvatore name that no amount of time can ever truly wash away. "
        ];

        async function flowInk(text, container) {
            const words = text.split(' ');
            for (let word of words) {
                const span = document.createElement('span');
                span.className = 'ink-word';
                span.innerText = word + ' ';
                container.appendChild(span);
                
                // Force reflow
                span.offsetHeight; 
                
                setTimeout(() => span.classList.add('visible'), 50);
                await new Promise(r => setTimeout(r, 200 + Math.random() * 200));
            }
        }

        castBtn.addEventListener('click', async () => {
            const raw = document.getElementById('thought-input').value.trim();
            if (!raw) return;

            // 1. Shadow Sweep Transition
            sweep.classList.add('sweep-active');
            
            setTimeout(() => {
                // 2. Structural Overhaul
                inputControls.classList.add('hidden');
                actionUi.classList.add('hidden');
                journal.classList.add('open');
                
                stefanViews.forEach(v => {
                    v.classList.remove('hidden');
                    v.classList.add('active');
                });

                // 3. Date & Logic
                const now = new Date();
                dateEl.innerText = now.toLocaleDateString('en-US', { 
                    year: 'numeric', month: 'long', day: 'numeric' 
                }).toUpperCase();

                const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
                const stylized = raw.toLowerCase().replace(/\./g, "...");
                const fullEntry = prefix + stylized + "\n\n— S.";

                // 4. Ghost Ink Flow
                flowInk(fullEntry, outputLeft);
                
            }, 750);
        });
    </script>
</body>
</html>
