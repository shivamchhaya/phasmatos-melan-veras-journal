<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefan's Journal | Phasmatos Melan Veras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=La+Belle+Aurore&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --desk: #0a0705;
            --leather: #2a1b15;
            --leather-dark: #1a0f0a;
            --parchment: #e2d1b3;
            --ink: #1c1a18;
            --gold: #8e7e50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--desk);
            /* Dark mahogany/wood desk texture */
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.8) 100%),
                url('https://www.transparenttextures.com/patterns/dark-wood.png');
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Ambient Lighting */
        .shadow-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(255, 147, 41, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 100;
        }

        /* The Journal */
        .book {
            position: relative;
            width: 450px;
            height: 600px;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .book.open {
            transform: translateX(225px);
        }

        /* Cover & Pages */
        .cover, .back-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--leather);
            background-image: url('https://www.transparenttextures.com/patterns/leather.png');
            border-radius: 4px 12px 12px 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            transform-origin: left;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .cover::after {
            content: '';
            position: absolute;
            left: 15px; top: 0; bottom: 0; width: 2px;
            background: rgba(0,0,0,0.3);
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
        }

        .book.open .cover {
            transform: rotateY(-180deg);
        }

        .crest {
            width: 120px;
            opacity: 0.6;
            filter: sepia(1) saturate(0.5) brightness(0.8);
            margin-bottom: 2rem;
        }

        .cover-title {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Inner Pages */
        .pages {
            position: absolute;
            width: 98%;
            height: 96%;
            top: 2%; left: 1%;
            background: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
            display: flex;
            transform-style: preserve-3d;
        }

        .page-left, .page-right {
            flex: 1;
            padding: 4rem 3rem;
            position: relative;
            overflow: hidden;
        }

        .page-left {
            border-right: 1px solid rgba(0,0,0,0.1);
            background: linear-gradient(to right, transparent 90%, rgba(0,0,0,0.05) 100%);
        }

        .page-right {
            background: linear-gradient(to left, transparent 90%, rgba(0,0,0,0.05) 100%);
        }

        /* Crease Shadow */
        .spine-shadow {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 40px;
            transform: translateX(-50%);
            background: linear-gradient(to right, 
                rgba(0,0,0,0) 0%, 
                rgba(0,0,0,0.2) 50%, 
                rgba(0,0,0,0) 100%);
            z-index: 5;
        }

        /* Typography & Content */
        .date-header {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--ink);
            opacity: 0.7;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .writing-area {
            font-family: 'Pinyon Script', cursive;
            font-size: 2rem;
            color: var(--ink);
            line-height: 1.3;
            min-height: 200px;
            /* Incremental bleed effect helper */
            position: relative;
        }

        /* Ghost Writing Effect */
        .ink-bleed {
            display: inline;
            opacity: 0;
            animation: inkSink 0.8s forwards;
        }

        @keyframes inkSink {
            0% { opacity: 0; filter: blur(2px); transform: scale(1.05); }
            100% { opacity: 0.9; filter: blur(0px); transform: scale(1); }
        }

        /* Input Controls (Naturally Integrated) */
        .ui-overlay {
            position: fixed;
            bottom: 5vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            z-index: 200;
            transition: opacity 1s;
        }

        .wax-seal-btn {
            width: 80px; height: 80px;
            background: #7a1515;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s;
            position: relative;
        }

        .wax-seal-btn:hover { transform: scale(1.1) rotate(5deg); }

        .wax-seal-btn::after {
            content: 'S';
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            color: rgba(255,255,255,0.2);
            font-weight: bold;
        }

        .modern-input {
            width: 400px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--parchment);
            padding: 1rem;
            font-family: 'Cormorant Garamond', serif;
            border-radius: 4px;
            outline: none;
            text-align: center;
            font-size: 1.1rem;
        }

        .spell-text {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Hidden initially */
        .hidden { opacity: 0; pointer-events: none; }

    </style>
</head>
<body>
    <div class="shadow-overlay"></div>

    <div id="journal-book" class="book">
        <!-- Back Cover -->
        <div class="back-cover" style="transform: translateZ(-1px);"></div>
        
        <!-- Inner Pages -->
        <div class="pages">
            <div class="spine-shadow"></div>
            <div class="page-left">
                <div class="date-header" id="current-date"></div>
                <div id="stefan-writing" class="writing-area"></div>
            </div>
            <div class="page-right">
                <div class="writing-area" id="stefan-writing-cont"></div>
            </div>
        </div>

        <!-- Front Cover -->
        <div class="cover" id="book-cover">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/S_initial.svg/1200px-S_initial.svg.png" class="crest" alt="Salvatore Crest">
            <span class="cover-title">The Journal of Stefan Salvatore</span>
        </div>
    </div>

    <div id="controls" class="ui-overlay">
        <input type="text" id="raw-input" class="modern-input" placeholder="Confess your thoughts...">
        <div class="spell-text">Phasmatos Melan Veras</div>
        <button id="seal-btn" class="wax-seal-btn"></button>
    </div>

    <script>
        const book = document.getElementById('journal-book');
        const sealBtn = document.getElementById('seal-btn');
        const controls = document.getElementById('controls');
        const input = document.getElementById('raw-input');
        const writingArea = document.getElementById('stefan-writing');
        const dateEl = document.getElementById('current-date');

        const prefixes = [
            "I shouldn't be writing this, but the weight of the day is heavy. ",
            "The centuries change, yet the shadows in this house remain the same. ",
            "I find myself staring at the ink, wondering if it's the only truth left. ",
            "Another day of pretending, another night of reality. "
        ];

        async function ghostWrite(text, element) {
            const words = text.split(' ');
            for (let word of words) {
                const span = document.createElement('span');
                span.className = 'ink-bleed';
                span.innerText = word + ' ';
                element.appendChild(span);
                await new Promise(r => setTimeout(r, 150 + Math.random() * 200));
            }
        }

        sealBtn.addEventListener('click', async () => {
            const raw = input.value.trim();
            if (!raw) return;

            // 1. Hide Controls
            controls.classList.add('hidden');

            // 2. Open Book
            book.classList.add('open');

            // 3. Prepare Date
            const now = new Date();
            dateEl.innerText = now.toLocaleDateString('en-US', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });

            // 4. Construct Stefan's thought
            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            const stylized = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase().replace(/\./g, "...");
            const fullEntry = prefix + stylized + "\n\n- S.";

            // 5. Start Ghost Writing after book opens
            setTimeout(() => {
                ghostWrite(fullEntry, writingArea);
            }, 1600);
        });

        // Toggle open/close for curiosity
        book.addEventListener('click', () => {
            if (book.classList.contains('open') && writingArea.innerText !== "") {
                // Keep it open if we've written
            } else {
                // Optional: allow manual previewing
            }
        });
    </script>
</body>
</html>
