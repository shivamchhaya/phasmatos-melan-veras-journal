<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phasmatos Melan Veras | Stefan's Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=La+Belle+Aurore&family=Playfair+Display:ital,wght@0,400;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050403;
            --leather: #1a0f0a;
            --parchment: #d4c4a8;
            --ink: #1a1a1a;
            --candle: rgba(255, 147, 41, 0.15);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--parchment);
            font-family: 'Playfair Display', serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Atmospheric Background */
        .ambient-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, var(--bg-dark) 80%);
            pointer-events: none;
            z-index: 5;
        }

        .candle-flicker {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--candle);
            pointer-events: none;
            z-index: 2;
            animation: flicker 5s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.1; }
            20% { opacity: 0.15; }
            40% { opacity: 0.08; }
            60% { opacity: 0.12; }
            80% { opacity: 0.18; }
            100% { opacity: 0.1; }
        }

        .mist {
            position: fixed;
            width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/fog.png');
            top: -50%; left: -50%;
            opacity: 0.15;
            z-index: 1;
            animation: drift 60s linear infinite;
            pointer-events: none;
        }

        @keyframes drift {
            from { transform: translate(0,0); }
            to { transform: translate(10%, 10%); }
        }

        /* Main Container */
        .journal-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 900px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        header h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.5rem;
            color: #8e7e50;
            text-shadow: 0 0 15px rgba(142, 126, 80, 0.3);
            letter-spacing: 4px;
            text-align: center;
        }

        /* Liquid Glass Input */
        .input-container {
            width: 100%;
            flex-grow: 1;
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: opacity 1s ease;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--parchment);
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            line-height: 1.8;
            resize: none;
        }

        /* Spell Button */
        .cast-btn {
            background: transparent;
            border: 1px solid #8e7e50;
            color: #8e7e50;
            padding: 1rem 3rem;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .cast-btn:hover {
            background: #8e7e50;
            color: var(--bg-dark);
            box-shadow: 0 0 30px rgba(142, 126, 80, 0.4);
        }

        /* Transformed Journal View */
        .journal-entry {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #d4c4a8;
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
            border-left: 20px solid #2a1b15;
            border-radius: 4px;
            padding: 3rem 4rem;
            color: var(--ink);
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            overflow-y: auto;
        }

        .journal-entry.active {
            display: block;
            opacity: 1;
            animation: fadeIn 2.5s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .journal-text {
            font-family: 'Pinyon Script', cursive;
            font-size: 2.2rem;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .entry-header {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            font-size: 1rem;
        }

        /* Spell Transition Overlay */
        .spell-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .flash-active {
            animation: flashAnim 1.5s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 0; }
            20% { opacity: 0.8; }
            100% { opacity: 0; }
        }

    </style>
</head>
<body>
    <div class="ambient-overlay"></div>
    <div class="candle-flicker"></div>
    <div class="mist"></div>
    <div id="spell-flash" class="spell-flash"></div>

    <div class="journal-wrapper">
        <header>
            <h1>Phasmatos Melan Veras</h1>
        </header>

        <div id="input-view" class="input-container">
            <textarea id="thought-input" placeholder="Confess your thoughts to the shadows..."></textarea>
        </div>

        <div id="journal-view" class="journal-entry">
            <div class="entry-header" id="current-date"></div>
            <div id="transformed-text" class="journal-text"></div>
        </div>

        <button id="cast-btn" class="cast-btn">Cast Spell</button>
    </div>

    <script>
        const castBtn = document.getElementById('cast-btn');
        const inputView = document.getElementById('input-view');
        const journalView = document.getElementById('journal-view');
        const flash = document.getElementById('spell-flash');
        const output = document.getElementById('transformed-text');
        const dateEl = document.getElementById('current-date');

        const stefanQuotes = [
            "I should not be writing this, but the silence of the boarding house is too much to bear tonight. ",
            "The centuries bleed together, yet every choice I've made feels like it happened only yesterday. ",
            "I look into the mirror and I wonder who is looking back. The man I want to be, or the monster I've tried to bury. ",
            "Mystic Falls has a way of drawing out the secrets we try hardest to hide. "
        ];

        const stefanClosers = [
            "\n\nI have to believe there is a way back to the light. I have to.",
            "\n\nTomorrow, I will try to be better. For Elena. For myself.",
            "\n\nSome secrets are meant to stay buried, but the ink never lies.",
            "\n\n- Stefan"
        ];

        castBtn.addEventListener('click', () => {
            const rawText = document.getElementById('thought-input').value;
            if (!rawText.trim()) return;

            // Date Formatting
            const now = new Date();
            dateEl.innerText = now.toLocaleDateString('en-US', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });

            // Trigger Spell Transition
            flash.classList.add('flash-active');
            
            setTimeout(() => {
                flash.classList.remove('flash-active');
                inputView.style.display = 'none';
                castBtn.style.display = 'none';
                
                // Transformation logic
                const prefix = stefanQuotes[Math.floor(Math.random() * stefanQuotes.length)];
                const closer = stefanClosers[Math.floor(Math.random() * stefanClosers.length)];
                
                // Emulate Stefan's brooding tone
                let processed = rawText
                    .replace(/\b(i|I)'m\b/g, "I am")
                    .replace(/\b(i|I)'ve\b/g, "I have")
                    .replace(/\b(can't|cant)\b/g, "cannot")
                    .replace(/\b(don't|dont)\b/g, "do not")
                    .replace(/\./g, "...");

                output.innerText = prefix + processed + closer;
                journalView.classList.add('active');
            }, 750);
        });
    </script>
</body>
</html>
