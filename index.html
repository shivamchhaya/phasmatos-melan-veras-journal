<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stefan Salvatore's Journal | TVD Authentic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=La+Belle+Aurore&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --leather: #2b1d16;
            --paper: #e3d3ba;
            --ink: #1a1b1e;
            --ink-fade: #2a2c31;
            --wax: #7a1616;
            --brass: #8e7e50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #080605;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%),
                url('https://www.transparenttextures.com/patterns/dark-wood.png');
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* The Journal - Physical Structure */
        .journal-container {
            position: relative;
            width: 1000px;
            height: 680px;
            background: var(--leather);
            background-image: url('https://www.transparenttextures.com/patterns/leather.png');
            border-radius: 8px 15px 15px 8px;
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.9),
                inset 0 0 40px rgba(0,0,0,0.5);
            display: flex;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            transform: rotateX(2deg);
        }

        /* The Spine */
        .journal-container::after {
            content: '';
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 30px;
            background: linear-gradient(to right, rgba(0,0,0,0.4), rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.4));
            transform: translateX(-50%);
            z-index: 10;
        }

        /* The Pages */
        .pages {
            flex: 1;
            background: var(--paper);
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
            box-shadow: inset 0 0 100px rgba(0,0,0,0.05);
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .page-left, .page-right {
            flex: 1;
            padding: 80px 70px; /* Precise deep margins */
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* The Gutter Shadow */
        .gutter-shadow {
            position: absolute;
            top: 0; bottom: 0; width: 60px;
            z-index: 5;
            pointer-events: none;
        }
        .page-left .gutter-shadow { right: 0; background: linear-gradient(to left, rgba(0,0,0,0.15), transparent); }
        .page-right .gutter-shadow { left: 0; background: linear-gradient(to right, rgba(0,0,0,0.15), transparent); }

        /* Left Page: Writing Guidlines & Input */
        .guidelines {
            position: absolute;
            top: 80px; left: 70px; right: 70px; bottom: 80px;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 100% 2.4rem;
            pointer-events: none;
        }

        .writing-input {
            width: 100%;
            height: 350px;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            line-height: 2.4rem;
            color: var(--ink);
            resize: none;
            z-index: 2;
            opacity: 0.8;
        }

        /* Wax Seal Button */
        .cast-container {
            margin-top: auto;
            display: flex;
            justify-content: center;
        }

        .wax-seal {
            width: 70px; height: 70px;
            background: var(--wax);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 0 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s;
            position: relative;
        }

        .wax-seal:hover { transform: scale(1.05) rotate(5deg); }

        .wax-seal::before {
            content: 'S';
            font-family: 'Cormorant Garamond', serif;
            color: rgba(255,255,255,0.2);
            font-size: 2.2rem;
            font-weight: bold;
        }

        /* Right Page: Katherine Layout */
        .katherine-portrait {
            position: absolute;
            top: 60px;
            right: 60px;
            width: 120px;
            text-align: center;
            opacity: 0.7;
            filter: sepia(0.6) contrast(0.9);
            pointer-events: none;
        }

        .katherine-img {
            width: 100px;
            height: 130px;
            background: url('https://i.pinimg.com/736x/88/44/78/8844784409395563914a87265893361e.jpg') center/cover;
            border-radius: 50% 50% 0 0;
            margin-bottom: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .katherine-label {
            font-family: 'La Belle Aurore', cursive;
            font-size: 0.8rem;
            color: var(--ink);
        }

        /* Output Text */
        .journal-output {
            font-family: 'Pinyon Script', cursive;
            font-size: 2rem;
            line-height: 1.4;
            color: var(--ink);
            white-space: pre-wrap;
            z-index: 2;
            padding-right: 40px; /* Room for Katherine */
        }

        /* Ghost Writing Ink Effect */
        .ink-char {
            display: inline;
            opacity: 0;
            filter: blur(1px);
            transition: opacity 0.6s ease, filter 0.8s ease;
        }
        .ink-char.visible {
            opacity: 0.9;
            filter: blur(0px);
        }

        /* Spell Transition Shadow */
        .spell-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .spell-active {
            animation: inkSweep 2s ease-in-out forwards;
        }

        @keyframes inkSweep {
            0% { opacity: 0; }
            50% { opacity: 0.7; }
            100% { opacity: 0; }
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>
    <div id="spell-overlay" class="spell-overlay"></div>

    <main class="journal-container">
        <div class="pages">
            <!-- Left Page -->
            <div class="page-left">
                <div class="gutter-shadow"></div>
                <div class="guidelines"></div>
                <textarea id="raw-thoughts" class="writing-input" placeholder="Confess your thoughts to the page..."></textarea>
                
                <div class="cast-container">
                    <button id="cast-btn" class="wax-seal" title="Phasmatos Melan Veras"></button>
                </div>
            </div>

            <!-- Right Page -->
            <div class="page-right">
                <div class="gutter-shadow"></div>
                
                <div class="katherine-portrait" id="katherine-section">
                    <div class="katherine-img"></div>
                    <div class="katherine-label">Katherine 1864</div>
                </div>

                <div id="date-header" class="katherine-label" style="font-size: 1rem; margin-bottom: 2rem; opacity: 0.6;"></div>
                <div id="stefan-output" class="journal-output"></div>
            </div>
        </div>
    </main>

    <script>
        const castBtn = document.getElementById('cast-btn');
        const overlay = document.getElementById('spell-overlay');
        const input = document.getElementById('raw-thoughts');
        const output = document.getElementById('stefan-output');
        const dateHeader = document.getElementById('date-header');

        const prefixes = [
            "I shouldn't be writing this. But the weight of the day is too heavy. ",
            "I look into the mirror and I wonder who is looking back. The man I want to be, or the monster I've tried to bury. ",
            "Every heartbeat feels like a debt I haven't paid. A reminder of what I am. ",
            "Mystic Falls has a way of drawing out the secrets we try hardest to hide. "
        ];

        async function ghostWrite(text, container) {
            container.innerHTML = '';
            const characters = text.split('');
            for (let char of characters) {
                const span = document.createElement('span');
                span.className = 'ink-char';
                span.innerText = char;
                container.appendChild(span);
                
                // Force layout reflow
                span.offsetHeight; 
                
                setTimeout(() => span.classList.add('visible'), 10);
                await new Promise(r => setTimeout(r, 40 + Math.random() * 60));
            }
        }

        castBtn.addEventListener('click', async () => {
            const raw = input.value.trim();
            if (!raw) return;

            // Trigger Shadow Sweep
            overlay.classList.add('spell-active');
            
            setTimeout(() => {
                // Prepare Date
                const now = new Date();
                dateHeader.innerText = now.toLocaleDateString('en-US', { 
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
                });

                // Style logic
                const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
                const stylized = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase().replace(/\./g, "...");
                const fullEntry = prefix + stylized + "\n\n— Stefan";

                // Start Writing
                ghostWrite(fullEntry, output);
                
            }, 1000);

            setTimeout(() => {
                overlay.classList.remove('spell-active');
            }, 2500);
        });
    </script>
</body>
</html>
