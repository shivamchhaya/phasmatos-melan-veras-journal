<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phasmatos Melan Veras | Stefan's Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=La+Belle+Aurore&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --desk-dark: #070504;
            --wood-grain: #1a120b;
            --parchment-base: #e2d1b1;
            --ink-black: #1c1917;
            --shadow: rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--desk-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(30, 20, 15, 0.4) 0%, transparent 100%),
                url('https://www.transparenttextures.com/patterns/dark-wood.png');
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
        }

        /* The Journal - Physical Object */
        .journal {
            position: relative;
            width: 900px;
            height: 600px;
            background: #2a1b15; /* Leather color */
            border-radius: 4px 12px 12px 4px;
            box-shadow: 
                0 30px 60px -12px rgba(0,0,0,0.9),
                0 18px 36px -18px rgba(0,0,0,0.5),
                inset 0 0 40px rgba(0,0,0,0.4);
            display: flex;
            padding: 10px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Pages Surface */
        .page-container {
            flex: 1;
            background: var(--parchment-base);
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
            display: flex;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Spine Crease */
        .page-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 40px;
            height: 100%;
            background: linear-gradient(to right, 
                rgba(0,0,0,0.15) 0%, 
                rgba(0,0,0,0) 45%, 
                rgba(0,0,0,0) 55%, 
                rgba(0,0,0,0.15) 100%);
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
        }

        .left-page, .right-page {
            flex: 1;
            padding: 50px 60px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Tactile Elements */
        .handwritten-lines {
            position: absolute;
            top: 50px; left: 60px; right: 60px; bottom: 50px;
            background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 100% 2.2rem;
            pointer-events: none;
        }

        /* Typography */
        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.2rem;
            color: var(--ink-black);
            opacity: 0.6;
            letter-spacing: 3px;
            margin-bottom: 2rem;
            text-align: center;
        }

        .input-area {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            line-height: 2.2rem;
            color: var(--ink-black);
            resize: none;
            z-index: 5;
        }

        /* The Spell Button - Vintage Wax Seal Style */
        .spell-trigger {
            position: absolute;
            bottom: 40px;
            right: 60px;
            width: 60px;
            height: 60px;
            background: #7a1b15;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.5),
                inset 0 2px 4px rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }

        .spell-trigger::after {
            content: 'S';
            font-family: 'Cinzel Decorative', cursive;
            color: rgba(255,255,255,0.4);
            font-size: 1.5rem;
        }

        .spell-trigger:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Output View */
        .output-content {
            font-family: 'Pinyon Script', cursive;
            font-size: 2.2rem;
            line-height: 2.2rem;
            color: var(--ink-black);
            opacity: 0;
            transition: opacity 3s ease;
            white-space: pre-wrap;
            z-index: 5;
        }

        .date-header {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            color: var(--ink-black);
            opacity: 0.7;
        }

        /* Ink Bleed Animation */
        .ink-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 50;
            mix-blend-mode: multiply;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes inkBleed {
            0% { opacity: 0; }
            30% { opacity: 0.9; }
            100% { opacity: 0; }
        }

        .bleed-active {
            animation: inkBleed 2s forwards;
        }

        .hidden { display: none; }

        /* Ambient Lighting */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 100;
        }

    </style>
</head>
<body>
    <div class="vignette"></div>
    <div id="ink-bleed" class="ink-overlay"></div>

    <main class="journal">
        <div class="page-container">
            <div class="left-page">
                <div class="handwritten-lines"></div>
                <h1>Phasmatos Melan Veras</h1>
                <textarea id="raw-thoughts" class="input-area" placeholder="Write your truth here..."></textarea>
            </div>
            
            <div class="right-page">
                <div class="handwritten-lines"></div>
                <div id="output-view" class="hidden">
                    <div class="date-header" id="current-date"></div>
                    <div id="stefan-text" class="output-content"></div>
                </div>
                
                <button id="spell-btn" class="spell-trigger" title="Cast Spell"></button>
            </div>
        </div>
    </main>

    <script>
        const spellBtn = document.getElementById('spell-btn');
        const rawInput = document.getElementById('raw-thoughts');
        const outputView = document.getElementById('output-view');
        const stefanText = document.getElementById('stefan-text');
        const dateEl = document.getElementById('current-date');
        const inkBleed = document.getElementById('ink-bleed');

        const prefixes = [
            "The truth is, I don't know how much longer I can pretend. ",
            "I look into the mirror and I wonder who is looking back. ",
            "Every heartbeat feels like a debt I haven't paid. ",
            "Mystic Falls has a way of drawing out the darkest parts of us. "
        ];

        const closers = [
            "\n\nI have to believe there is still hope for me.",
            "\n\nSome things are better left in the past.",
            "\n\nTomorrow is another day to try and be a better man.",
            "\n\n- S. Salvatore"
        ];

        spellBtn.addEventListener('click', () => {
            const input = rawInput.value;
            if (!input.trim()) return;

            // Trigger Ink Bleed Transition
            inkBleed.classList.add('bleed-active');

            setTimeout(() => {
                // Set Date
                const now = new Date();
                dateEl.innerText = now.toLocaleDateString('en-US', { 
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
                });

                // Style the text
                const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
                const closer = closers[Math.floor(Math.random() * closers.length)];
                
                // Processing for brooding tone
                let processed = input.toLowerCase()
                    .replace(/\b(i)\b/g, "I")
                    .replace(/\b(i'm|im)\b/g, "I am")
                    .replace(/\b(i've|ive)\b/g, "I have")
                    .replace(/\./g, "...");

                stefanText.innerText = prefix + processed + closer;
                
                // Toggle Views
                rawInput.classList.add('hidden');
                document.querySelector('h1').classList.add('hidden');
                outputView.classList.remove('hidden');
                
                setTimeout(() => {
                    stefanText.style.opacity = 1;
                    spellBtn.style.display = 'none';
                }, 100);

            }, 1000);

            setTimeout(() => {
                inkBleed.classList.remove('bleed-active');
            }, 2500);
        });
    </script>
</body>
</html>
